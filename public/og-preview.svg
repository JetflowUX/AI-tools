<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI Tools Directory</title>
  <desc id="desc">Preview image for AI Tools Directory website</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <circle cx="980" cy="130" r="120" fill="#22d3ee" opacity="0.28" filter="url(#blur)" />
  <circle cx="190" cy="500" r="150" fill="#818cf8" opacity="0.22" filter="url(#blur)" />

  <g transform="translate(84 82)">
    <rect x="0" y="0" width="220" height="56" rx="28" fill="url(#accent)" />
    <text x="110" y="37" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#ffffff">AI Directory</text>

    <text x="0" y="150" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="72" font-weight="800" fill="#f8fafc">AI Tools Directory</text>
    <text x="0" y="205" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32" fill="#cbd5e1">200+ tools across 20 categories</text>

    <g transform="translate(0 260)">
      <rect x="0" y="0" width="200" height="54" rx="14" fill="#0b1220" stroke="#334155" />
      <text x="22" y="34" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" fill="#e2e8f0">Text &amp; Writing</text>

      <rect x="220" y="0" width="230" height="54" rx="14" fill="#0b1220" stroke="#334155" />
      <text x="242" y="34" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" fill="#e2e8f0">Code &amp; Development</text>

      <rect x="470" y="0" width="220" height="54" rx="14" fill="#0b1220" stroke="#334155" />
      <text x="492" y="34" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" fill="#e2e8f0">Image Generation</text>
    </g>

    <text x="0" y="438" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="26" fill="#94a3b8">Search, filter, and discover the best AI tools in one place.</text>
  </g>
</svg>
